name: Render Demo GIF

on:
  push:
    paths:
      - 'demo.tape'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/charmbracelet/vhs:latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Render demo GIF
        run: vhs demo.tape

      - name: Commit GIF
        run: |
          apk add git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add demo.gif
          if git diff --cached --quiet; then
            echo "No changes to demo.gif"
          else
            git commit -m "Update demo.gif [skip ci]"
            git push
          fi
