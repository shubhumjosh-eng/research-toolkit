name: Render Demo GIF

on:
  workflow_dispatch:  # Manual trigger only (VHS has CI issues)

jobs:
  render:
    runs-on: ubuntu-latest
    if: false  # Disabled until VHS CI issues resolved
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: charmbracelet/vhs-action@v2
        with:
          path: demo.tape
